<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vili</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Playfair Display', serif;
        }

        .content {
            z-index: 10;
            position: relative;
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 80px;
            font-weight: 400;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        h1:hover {
            letter-spacing: 12px;
        }

        .contact-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .contact-section.active {
            display: block;
        }

        .contact-title {
            color: #fff;
            font-size: 32px;
            margin-bottom: 40px;
            letter-spacing: 4px;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 15px 50px;
            font-size: 18px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }
    </style>
</head>
<body>
            <div class="content">
        <h1 id="title">vili</h1>
        <div class="contact-section" id="contact">
            <div class="contact-title">contact me</div>
            <div class="buttons">
                <button onclick="window.open('https://discord.gg/E8J3rZmX', '_blank')">Discord</button>
                <button onclick="window.open('https://www.roblox.com/users/3475669411/profile', '_blank')">Roblox</button>
                <button onclick="window.open('https://x.com/4vilian', '_blank')">Twitter</button>
            </div>
        </div>
    </div>
    
    <script>
        const numDots = 100;
        const dots = [];
        
        for (let i = 0; i < numDots; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            document.body.appendChild(dot);
            
            dots.push({
                element: dot,
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                baseY: Math.random() * window.innerHeight,
                speed: 0.5 + Math.random() * 1.5,
                amplitude: 20 + Math.random() * 40,
                frequency: 0.01 + Math.random() * 0.02
            });
        }
        
        let time = 0;
        
        function animate() {
            time += 0.02;
            
            dots.forEach(dot => {
                dot.y = dot.baseY + Math.sin(time * dot.frequency + dot.x * 0.01) * dot.amplitude;
                dot.x += dot.speed;
                
                if (dot.x > window.innerWidth) {
                    dot.x = -10;
                    dot.baseY = Math.random() * window.innerHeight;
                }
                
                dot.element.style.left = dot.x + 'px';
                dot.element.style.top = dot.y + 'px';
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();

        document.getElementById('title').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('contact').classList.add('active');
        });
    </script>
</body>
</html>
